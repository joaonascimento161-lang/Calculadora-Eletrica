<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de Resistor</title>
    <style>
        :root { --bg-color: #f0f2f5; --resistor-body: #d1b280; }
        body { font-family: sans-serif; background: var(--bg-color); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .container { background: white; padding: 2rem; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center; width: 450px; }
        
        .resistor-display { display: flex; align-items: center; justify-content: center; margin: 30px 0; }
        .fio { width: 40px; height: 6px; background-color: #bbb; }
        .corpo-resistor { width: 200px; height: 60px; background-color: var(--resistor-body); border-radius: 30px; display: flex; justify-content: space-evenly; align-items: center; padding: 0 10px; }
        .faixa { width: 12px; height: 100%; transition: all 0.3s; }
        
        .controles { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; text-align: left; margin-top: 20px; }
        .campo { display: flex; flex-direction: column; }
        .hidden { display: none; }
        
        .resultado-box { margin-top: 25px; padding: 15px; background: #eef2ff; border-radius: 10px; font-weight: bold; font-size: 1.2rem; color: #2563eb; }
        select { padding: 8px; border-radius: 5px; border: 1px solid #ccc; margin-top: 5px; }
        .tab-selector { margin-bottom: 20px; }
    </style>
</head>
<body>

<div class="container">
    <h1>Calculadora de Resistor</h1>

    <div class="tab-selector">
        <label><input type="radio" name="tipo" value="4" checked onclick="toggleModo(4)"> 4 Faixas</label>
        <label style="margin-left: 20px;"><input type="radio" name="tipo" value="5" onclick="toggleModo(5)"> 5 Faixas</label>
    </div>
    
    <div class="resistor-display">
        <div class="fio"></div>
        <div id="corpo" class="corpo-resistor">
            <div id="f1" class="faixa"></div>
            <div id="f2" class="faixa"></div>
            <div id="f3" class="faixa"></div> <div id="f4" class="faixa"></div>
            <div id="f5" class="faixa" style="display:none"></div>
        </div>
        <div class="fio"></div>
    </div>

    <div class="controles">
        <div class="campo">
            <label>1ª Faixa (Cor)</label>
            <select id="sel-f1" onchange="calcular()"></select>
        </div>
        <div class="campo">
            <label>2ª Faixa (Cor)</label>
            <select id="sel-f2" onchange="calcular()"></select>
        </div>
        <div id="campo-f3" class="campo hidden">
            <label>3ª Faixa (Cor)</label>
            <select id="sel-f3" onchange="calcular()"></select>
        </div>
        <div class="campo">
            <label>Multiplicador</label>
            <select id="sel-mult" onchange="calcular()"></select>
        </div>
        <div class="campo">
            <label>Tolerância</label>
            <select id="sel-tol" onchange="calcular()"></select>
        </div>
    </div>

    <div class="resultado-box" id="resultado">--- Ω</div>
</div>

<script>
    const coresDigitais = [
        {nome: "Preto", cor: "black", valor: 0}, {nome: "Marrom", cor: "brown", valor: 1},
        {nome: "Vermelho", cor: "red", valor: 2}, {nome: "Laranja", cor: "orange", valor: 3},
        {nome: "Amarelo", cor: "yellow", valor: 4}, {nome: "Verde", cor: "green", valor: 5},
        {nome: "Azul", cor: "blue", valor: 6}, {nome: "Violeta", cor: "violet", valor: 7},
        {nome: "Cinza", cor: "gray", valor: 8}, {nome: "Branco", cor: "white", valor: 9}
    ];

    const multiplicadores = [
        {nome: "Preto (x1)", cor: "black", mult: 1}, {nome: "Marrom (x10)", cor: "brown", mult: 10},
        {nome: "Vermelho (x100)", cor: "red", mult: 100}, {nome: "Laranja (x1k)", cor: "orange", mult: 1000},
        {nome: "Amarelo (x10k)", cor: "yellow", mult: 10000}, {nome: "Verde (x100k)", cor: "green", mult: 100000},
        {nome: "Azul (x1M)", cor: "blue", mult: 1000000}, {nome: "Dourado (x0.1)", cor: "gold", mult: 0.1},
        {nome: "Prata (x0.01)", cor: "silver", mult: 0.01}
    ];

    const tolerancias = [
        {nome: "Marrom (±1%)", cor: "brown", valor: 1}, {nome: "Vermelho (±2%)", cor: "red", valor: 2},
        {nome: "Dourado (±5%)", cor: "gold", valor: 5}, {nome: "Prata (±10%)", cor: "silver", valor: 10}
    ];

    let modo = 4;

    function popularSelects() {
        const preencher = (id, lista, prop) => {
            const el = document.getElementById(id);
            lista.forEach(c => {
                let opt = document.createElement("option");
                opt.value = c[prop];
                opt.text = c.nome;
                opt.dataset.cor = c.cor;
                el.add(opt);
            });
        };
        preencher('sel-f1', coresDigitais, 'valor');
        preencher('sel-f2', coresDigitais, 'valor');
        preencher('sel-f3', coresDigitais, 'valor');
        preencher('sel-mult', multiplicadores, 'mult');
        preencher('sel-tol', tolerancias, 'valor');
    }

    function toggleModo(m) {
        modo = m;
        document.getElementById('campo-f3').classList.toggle('hidden', m === 4);
        document.getElementById('f5').style.display = (m === 5) ? 'block' : 'none';
        calcular();
    }

    function calcular() {
        const v1 = document.getElementById('sel-f1');
        const v2 = document.getElementById('sel-f2');
        const v3 = document.getElementById('sel-f3');
        const vm = document.getElementById('sel-mult');
        const vt = document.getElementById('sel-tol');

        document.getElementById('f1').style.backgroundColor = v1.options[v1.selectedIndex].dataset.cor;
        document.getElementById('f2').style.backgroundColor = v2.options[v2.selectedIndex].dataset.cor;
        
        if(modo === 4) {
            document.getElementById('f3').style.backgroundColor = vm.options[vm.selectedIndex].dataset.cor;
            document.getElementById('f4').style.backgroundColor = vt.options[vt.selectedIndex].dataset.cor;
            var resistencia = ((parseInt(v1.value) * 10) + parseInt(v2.value)) * parseFloat(vm.value);
        } else {
            document.getElementById('f3').style.backgroundColor = v3.options[v3.selectedIndex].dataset.cor;
            document.getElementById('f4').style.backgroundColor = vm.options[vm.selectedIndex].dataset.cor;
            document.getElementById('f5').style.backgroundColor = vt.options[vt.selectedIndex].dataset.cor;
            var resistencia = ((parseInt(v1.value) * 100) + (parseInt(v2.value) * 10) + parseInt(v3.value)) * parseFloat(vm.value);
        }

        let texto = resistencia >= 1000000 ? (resistencia/1000000).toFixed(2) + " MΩ" : 
                    resistencia >= 1000 ? (resistencia/1000).toFixed(2) + " kΩ" : 
                    resistencia.toFixed(1) + " Ω";
        
        document.getElementById('resultado').innerText = `${texto} ±${vt.value}%`;
    }

    popularSelects();
    calcular();
</script>
</body>
</html>
